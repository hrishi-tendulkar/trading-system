{% extends "base.html" %}
{% block body %}
  <div class="stage">
    <div class="app-frame">
      <aside class="app-bar">
        <a class="brand-lockup" href="/weekly">
          <span class="brand-mark">T</span>
          <span>
            <span class="brand-name">Trading System</span>
            <span class="brand-sub">Weekly decision workspace</span>
          </span>
        </a>
        <nav class="top-nav" aria-label="Primary">
          <a href="/weekly" class="{% if active_page == 'weekly' %}active{% endif %}">Weekly Summary</a>
          <a href="/daily" class="{% if active_page == 'daily' %}active{% endif %}">Daily</a>
          <a href="/watchlist" class="{% if active_page == 'watchlist' %}active{% endif %}">Watchlist</a>
          <a href="/stocks/NVDA" class="{% if active_page == 'stocks' %}active{% endif %}">Stock Detail</a>
          <a href="/strategies" class="{% if active_page == 'strategies' %}active{% endif %}">Strategy Detail</a>
          <a href="/archive" class="{% if active_page == 'archive' %}active{% endif %}">Archive</a>
          <a href="/admin" class="{% if active_page == 'admin' %}active{% endif %}">Admin</a>
        </nav>
        <form class="logout-form" method="post" action="/logout">
          <button class="logout-button" type="submit">Log out</button>
        </form>
      </aside>
      <main class="content">
        {% block content %}{% endblock %}
      </main>
    </div>
  </div>
{% endblock %}
