{% extends "base.html" %}
{% block body %}
  <div class="page">
    <div class="shell">
      <aside class="card sidebar">
        <div class="eyebrow">Weekly Decision Cockpit</div>
        <div class="brand">Trading System</div>
        <div class="subtle">Server-rendered internal platform. This build is scaffolded and ready for real provider and database wiring.</div>
        <nav class="nav">
          <a href="/weekly" class="{% if active_page == 'weekly' %}active{% endif %}">Weekly review</a>
          <a href="/daily" class="{% if active_page == 'daily' %}active{% endif %}">Daily digest</a>
          <a href="/watchlist" class="{% if active_page == 'watchlist' %}active{% endif %}">Watchlist</a>
          <a href="/stocks/NVDA" class="{% if active_page == 'stocks' %}active{% endif %}">Stock detail</a>
          <a href="/admin" class="{% if active_page == 'admin' %}active{% endif %}">Admin</a>
        </nav>
        <form method="post" action="/logout">
          <button type="submit">Log out</button>
        </form>
      </aside>
      <main class="content">
        {% block content %}{% endblock %}
      </main>
    </div>
  </div>
{% endblock %}
