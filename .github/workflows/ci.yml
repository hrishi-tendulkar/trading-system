name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install ".[dev]"

      - name: Lint
        run: ruff check .

      - name: Syntax compile
        run: python -m compileall apps packages services scripts

      - name: Run tests
        run: pytest
